name: Avito Deal Finder

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-avito:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Скачать код репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить зависимости
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Запустить проверку Авито
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python avito_check.py

      - name: Сохранить обновлённую историю объявлений
        run: |
          git config user.name "avito-bot"
          git config user.email "avito-bot@users.noreply.github.com"
          git add data/listings.json
          git diff --staged --quiet || git commit -m "Обновление истории объявлений [skip ci]"
          git push

